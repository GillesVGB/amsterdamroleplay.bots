<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amsterdam Roleplay | Home</title>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1507087328752177214/1515755129452757082/amsterdamlogo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 50%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(135,206,235,0.08) 0%, transparent 70%);
            animation: rotate 40s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(135,206,235,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
        .logo-text { font-size: 1.4em; font-weight: bold; background: linear-gradient(135deg, #87CEEB, #4FC3F7, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: #fff; text-decoration: none; padding: 8px 20px; border-radius: 25px; transition: all 0.3s; position: relative; }
        .nav-link::before { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background: linear-gradient(135deg, #87CEEB, #4FC3F7); transition: width 0.3s; }
        .nav-link:hover::before, .nav-link.active::before { width: 70%; }
        .nav-link:hover, .nav-link.active { background: rgba(135,206,235,0.1); }
        .hero { text-align: center; padding: 80px 20px; }
        .hero-logo { width: 160px; height: 160px; border-radius: 50%; margin-bottom: 30px; animation: float 3s ease-in-out infinite; box-shadow: 0 0 50px rgba(135,206,235,0.4); }
        .hero h1 { font-size: 3.5em; margin-bottom: 20px; background: linear-gradient(135deg, #87CEEB, #4FC3F7, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.1em; color: #ccc; max-width: 600px; margin: 0 auto 30px; }
        .btn { background: linear-gradient(135deg, #87CEEB, #4FC3F7); border: none; color: #1a1a2e; padding: 12px 30px; border-radius: 40px; font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.3s; display: inline-block; text-decoration: none; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(135,206,235,0.3); }
        .footer { text-align: center; padding: 25px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 50px; font-size: 0.75em; opacity: 0.5; }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; padding: 15px; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .hero h1 { font-size: 2em; }
            .hero-logo { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <nav class="navbar">
        <div class="logo">
            <img src="https://cdn.discordapp.com/attachments/1507087328752177214/1515755129452757082/amsterdamlogo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Amsterdam Roleplay</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
        </div>
    </nav>
    <section class="hero">
        <img src="https://cdn.discordapp.com/attachments/1507087328752177214/1515755129452757082/amsterdamlogo.png" alt="Amsterdam Roleplay" class="hero-logo">
        <h1>Amsterdam Roleplay</h1>
        <p>Het centrale platform voor het beheer van alle overheids-, onderwereld- en invite-systemen van Amsterdam Roleplay.</p>
        <a href="dashboard.html" class="btn">📊 Ga naar Dashboard</a>
    </section>
    <footer class="footer">
        <p>🏛️ Gemeente Amsterdam - Bot Status Dashboard | © 2026 Amsterdam Roleplay</p>
    </footer>
</body>
</html>
